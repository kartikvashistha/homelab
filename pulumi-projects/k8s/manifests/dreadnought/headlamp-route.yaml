apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp-ui
  namespace: headlamp
spec:
  parentRefs:
    - name: istio-gateway  
      namespace: istio-system
  hostnames: ["homelab.home.arpa"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headlamp
      backendRefs:
        - name: headlamp
          port: 80
