config:
  kubernetes:context: dreadnought

  k8s:core:
    installGatewayApiCrds: true
    metallb:
      install: true
      addressPool:
        - 192.168.50.253-192.168.50.254

  k8s:helm:
    - releaseName: istio-base
      chart: base
      namespace: istio-system
      repo: "https://istio-release.storage.googleapis.com/charts"
      version: 1.29.1

    - releaseName: istiod
      chart: istiod
      namespace: istio-system
      repo: "https://istio-release.storage.googleapis.com/charts"
      version: 1.29.1

    - releaseName: istio-cni
      chart: cni
      namespace: istio-system
      repo: "https://istio-release.storage.googleapis.com/charts"
      version: 1.29.1

    - releaseName: ztunnel
      chart: ztunnel
      namespace: istio-system
      repo: "https://istio-release.storage.googleapis.com/charts"
      version: 1.29.1

    - releaseName: kiali-operator
      chart: kiali-operator
      namespace: kiali-operator
      repo: "https://kiali.org/helm-charts"
      version: 2.23.0

    - releaseName: coredns-external
      chart: coredns
      namespace: coredns
      repo: "https://coredns.github.io/helm"
      version: 1.45.2

    - releaseName: cert-manager
      chart: cert-manager
      namespace: cert-manager
      repo: "https://charts.jetstack.io"
      version: 1.20.0
      
