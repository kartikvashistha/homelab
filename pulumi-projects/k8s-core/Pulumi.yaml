name: k8s-core
description: Install core cluster services
runtime: go
config:
  pulumi:tags:
    value:
      pulumi:template: go

  kubernetes:context:
    value: 
      type: string
      description: Kubernetes context to use when installing & configuring objects within it

  k8s-core:helmCharts:
    value:
      type: array
      description: List of helm charts to install in a cluster
      items:
        releaseName:
          type: string
          description: Name of the helm chart to install
          default: ""
        chart:
          type: string
          description: Name of the helm chart to install
          default: ""
        repo:
          type: string
          description: Repository URL for the helm chart
          default: ""
        version:
          type: string
          description: Version of the helm chart to install
          default: ""
        namespace:
          type: string
          description: Namespace to install the helm chart in
          default: ""
        valuesFile:
          type: string
          description: Path to the values file for the helm chart
          default: ""
