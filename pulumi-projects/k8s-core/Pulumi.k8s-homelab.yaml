config:
  kubernetes:context: k8s-homelab

  k8s-core:helmCharts:
    - releaseName: istio
      chart: istiod
      namespace: istio-system
      repo: "https://istio-release.storage.googleapis.com/charts"
      version: 1.29.0
    - releaseName: coredns-external
      chart: coredns
      namespace: coredns
      repo: "https://coredns.github.io/helm"
      valuesFile: ./helm/values/k8s-homelab/coredns.yaml
      version: 1.45.2
    - releaseName: cert-manager
      chart: cert-manager
      namespace: cert-manager
      repo: "https://charts.jetstack.io"
      valuesFile: ./helm/values/k8s-homelab/cert-manager.yaml
      version: 1.20.0

  k8s-core:manifests: "./manifests/k8s-homelab"
